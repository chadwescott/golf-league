<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8">
  <title>Golf League</title>
  <base href="/">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <script>
    (function (location) {
      if (!location.search.startsWith('?/')) {
        return;
      }

      const decodedPath = location.search
        .slice(2)
        .split('&')
        .map(part => part.replace(/~and~/g, '&'))
        .join('?');

      window.history.replaceState(null, '', `${location.pathname}${decodedPath}${location.hash}`);
    }(window.location));
  </script>
  <link rel="icon" type="image/x-icon" href="favicon.ico">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif:ital,wght@0,100..900;1,100..900&display=swap"
    rel="stylesheet">
  <link
    href="https://fonts.googleapis.com/css2?family=Noto+Serif:ital,wght@0,100..900;1,100..900&family=Old+Standard+TT:ital,wght@0,400;0,700;1,400&display=swap"
    rel="stylesheet">
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet" />
</head>

<body>
  <app-root></app-root>
</body>

</html>
