<div class="results-table-wrapper">
    <table class="results-table">
        <thead>
            <tr>
                @for (column of columns(); track column.key) {
                <th>
                    <button class="sort-button" type="button" (click)="sortBy(column.key)">
                        <span>{{ column.label }}</span>
                        <span class="sort-indicator">{{ getSortIndicator(column.key) }}</span>
                    </button>
                </th>
                }
            </tr>
        </thead>
        <tbody>
            @for (stats of sortedPlayerStats(); track $index) {
            <tr>
                @for (column of columns(); track column.key) {
                <td [class.player]="column.key === 'playerId'" [class.stat]="column.key !== 'playerId'">
                    {{ getColumnValue(stats, column.key) }}
                </td>
                }
            </tr>
            }
        </tbody>
    </table>
</div>
