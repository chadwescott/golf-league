<div class="row">
    <div>
        <h3>
            Point Standings
        </h3>
        <app-player-stats-table
            [displayedColumns]="['playerId', 'eagles', 'birdies', 'pars', 'bogeys', 'doublePars', 'fairwaysHit', 'grossPoints', 'netPoints']"
            [defaultSortColumn]="'netPoints'" [defaultSortDirection]="'desc'"></app-player-stats-table>
        <hr />
        <h3>
            Versus Standings
        </h3>
        <app-player-stats-table [displayedColumns]="['playerId', 'wins', 'losses']" [defaultSortColumn]="'wins'"
            [defaultSortDirection]="'desc'"></app-player-stats-table>
        <hr />
        <h3>
            Skins Standings
        </h3>
        <app-player-stats-table [displayedColumns]="['playerId', 'netSkins', 'skinFee', 'netSkinAmount', 'skinPayout']"
            [defaultSortColumn]="'netSkinAmount'" [defaultSortDirection]="'desc'"
            [skinsView]="true"></app-player-stats-table>
        @if (appStateService.selectedSeason()?.imageUrl) {
        <hr />
        <img class="season" [src]="appStateService.selectedSeason()?.imageUrl"
            [alt]="appStateService.selectedSeason()?.year + ' Season'" />
        }
    </div>
</div>
